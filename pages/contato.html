<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contato</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

    <section>
        <h2>Entrar em Contato</h2>

        <form action="https://formspree.io/f/xnjlklpl" method="POST">

            <label>Nome:</label><br>
            <input type="text" name="nome" required><br><br>

            <label>Celular:</label><br>
            <input type="tel" name="celular" required><br><br>

            <label>Assunto:</label><br>
            <input type="text" name="assunto" required><br><br>

            <!-- email destino -->
            <input type="hidden" name="_replyto" value="jprofpg@gmail.com">

            <button type="submit">Enviar</button>
            <button type="button" onclick="history.back()">Cancelar</button>

        </form>

    </section>

</body>
</html>
